<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="2026〜2027年のゲーム発売予定をカレンダーで確認。Switch 2の注目作や主要新作をまとめて表示。">
  <title>ゲーム発売カレンダー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">コンテンツへ</a>

  <!-- Ticker -->
  <div class="ticker-bar" aria-label="発売予定スクロール表示">
    <div class="ticker-label">発売予定</div>
    <div class="ticker-viewport">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-logo">🎮</span>
        <span class="brand-title">ゲーム発売カレンダー</span>
      </div>
      <div class="header-status">
        <span class="status-item" id="status-count">— タイトル</span>
        <span class="status-sep">·</span>
        <span class="status-next" id="status-next">読み込み中…</span>
      </div>
    </div>
  </header>

  <!-- Notice bar -->
  <div class="notice-bar" role="note" aria-label="サイト注意事項">
    <span class="notice-icon" aria-hidden="true">ℹ</span>
    <span class="notice-text">掲載情報は随時更新中です。発売日・内容は予告なく変更になる場合があります。最新情報は各タイトルの<strong>公式サイト</strong>でご確認ください。</span>
  </div>

  <main class="page-main" id="main-content">
    <div class="container">

      <!-- ══ CALENDAR VIEW ══════════════════════════════════════ -->
      <section id="calendar-view" class="view-panel" aria-label="カレンダービュー">

        <div class="cal-header">
          <div class="cal-title-block">
            <div class="cal-eyebrow">発売スケジュール</div>
            <h1 class="cal-month-title" id="cal-month-title">————</h1>
          </div>
          <div class="cal-controls">
            <button class="cal-nav-btn" id="btn-prev" aria-label="前の月">← 前月</button>
            <button class="cal-nav-btn" id="btn-next" aria-label="次の月">次月 →</button>
            <button class="btn-switch-list" id="btn-list-view">一覧 ↓</button>
          </div>
        </div>

        <!-- 次回発売スポットライト -->
        <div id="next-up-card" class="next-up-card" hidden aria-label="次に発売するゲーム">
          <div class="next-up-eyebrow"></div>
          <div class="next-up-title"></div>
          <div class="next-up-meta">
            <span class="next-up-date"></span>
            <span class="next-up-countdown"></span>
          </div>
        </div>

        <div class="cal-dow-row" role="row" aria-hidden="true">
          <span>月</span>
          <span>火</span>
          <span>水</span>
          <span>木</span>
          <span>金</span>
          <span class="dow-sat">土</span>
          <span class="dow-sun">日</span>
        </div>

        <div class="cal-grid" id="cal-grid" role="grid" aria-label="発売カレンダー"></div>

        <div class="cal-footer">
          <div class="cal-legend" id="cal-legend"></div>
          <div class="cal-hint">日付をタップで詳細表示</div>
        </div>

      </section>

      <!-- ══ LIST VIEW ══════════════════════════════════════════ -->
      <section id="list-view" class="view-panel view-panel--hidden" aria-label="リストビュー">

        <div class="list-header">
          <button class="btn-back-calendar" id="btn-calendar-view">← カレンダーへ</button>
          <div class="list-title-block">
            <div class="list-eyebrow">発売一覧</div>
            <h2 class="list-month-title" id="list-month-title"></h2>
          </div>
        </div>

        <div class="game-list" id="game-list" role="list"></div>

      </section>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">ゲーム発売カレンダー</p>
      <p class="footer-notice">掲載情報は随時更新中です。発売日・内容は変更になる場合があります。最新情報は各タイトルの公式サイトでご確認ください。</p>
      <p class="footer-copy footer-copy--small">データ更新: <span id="footer-updated"></span></p>
    </div>
  </footer>

  <script src="assets/js/games.js"></script>
  <script src="assets/js/main.js"></script>

</body>
</html>
